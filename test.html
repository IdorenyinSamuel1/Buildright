<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>

        .search-container {
            position: relative;
            left: 50px;
        }

      

        span {
            position: absolute;
            top: 15px;
            left: 10px;

            
        }

            height: 50px;
            

        }

</head>
<body>
    <div class="search-container">
        <input type="text" id="search-box" placeholder="Type / to search">
        <span><i class="fa-solid fa-magnifying-glass"></i></span>
    </div>
</body>
